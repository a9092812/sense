apiVersion: apps/v1
kind: Deployment
metadata:
  name: sense-worker
  labels:
    app: sense-worker
spec:
  replicas: 3
  selector:
    matchLabels:
      app: sense-worker
  template:
    metadata:
      labels:
        app: sense-worker
    spec:
      containers:
      - name: worker
        image: sense-worker:latest
        imagePullPolicy: IfNotPresent
        env:
        - name: DB_HOST
          value: "postgres-service"
        - name: REDIS_HOST
          value: "redis-service"
        - name: KAFKA_BROKERS
          value: "kafka-service:9092"
        resources:
          limits:
            cpu: "1000m"
            memory: "1Gi"
          requests:
            cpu: "500m"
            memory: "512Mi"
